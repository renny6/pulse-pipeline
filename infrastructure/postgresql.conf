# ==============================================================================
# PULSE PIPELINE — postgresql.conf (TimescaleDB / WAL Tuning)
# ==============================================================================
# This file is bind-mounted into the TimescaleDB container at:
#   /etc/postgresql/postgresql.conf
#
# It is loaded via the `postgres -c config_file=...` command in docker-compose.
#
# WHY THIS FILE EXISTS
# --------------------
# [MANDATE — advanced_distributed_hurdles.md Challenge 14]
# At 5,000+ RPS with UPSERT/ON CONFLICT operations, the database generates
# enormous WAL volumes. Without tuning, WAL accumulates faster than the
# checkpointer can flush it to disk, triggering an emergency database panic
# shutdown. This configuration prevents that failure mode.
#
# [MANDATE — master_solution_blueprint.md §3]
# max_wal_size and checkpoint_completion_target are the two primary levers for
# WAL disk exhaustion defense.
# ==============================================================================

# ------------------------------------------------------------------------------
# CONNECTION & AUTHENTICATION
# ------------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 200

# Use scram-sha-256 (set in docker-compose via POSTGRES_HOST_AUTH_METHOD)
# password_encryption = scram-sha-256

# ------------------------------------------------------------------------------
# MEMORY
# Container limit: 1GB. PostgreSQL should use ~50-60% for shared_buffers.
# ------------------------------------------------------------------------------
shared_buffers = 512MB
effective_cache_size = 768MB
work_mem = 8MB
maintenance_work_mem = 128MB
wal_buffers = 16MB

# ------------------------------------------------------------------------------
# WAL TUNING — CRITICAL MANDATE (Challenge 14)
# ------------------------------------------------------------------------------
# [MANDATE] max_wal_size = 4GB
# The maximum size the WAL can grow to before forcing a checkpoint.
# Setting this high prevents emergency checkpoints triggered by WAL overflow
# during high-velocity ingestion bursts. PostgreSQL default is 1GB.
max_wal_size = 4GB

# [MANDATE] min_wal_size = 1GB
# Ensures the WAL segment pool is pre-allocated and ready, avoiding
# I/O spikes from on-demand segment creation during traffic surges.
min_wal_size = 1GB

# [MANDATE] checkpoint_completion_target = 0.9
# Instructs the checkpointer to spread its I/O work across 90% of the
# interval between checkpoints. This smooths disk I/O and prevents the
# "checkpoint spike" that can starve worker write operations.
# PostgreSQL default is 0.5 (50%), which is aggressive under heavy load.
checkpoint_completion_target = 0.9

# How long between routine checkpoints (in seconds).
# At high load, WAL-driven checkpoints will occur more frequently anyway;
# this is just the baseline timer.
checkpoint_timeout = 10min

# ------------------------------------------------------------------------------
# WRITE-AHEAD LOG SETTINGS
# ------------------------------------------------------------------------------
wal_level = replica
# fsync = on ensures data durability (default). Never disable in production.
fsync = on
synchronous_commit = on
# full_page_writes protects against torn pages on crash; keep enabled.
full_page_writes = on

# ------------------------------------------------------------------------------
# QUERY PLANNER
# ------------------------------------------------------------------------------
random_page_cost = 1.1         # SSD-optimized (Docker volume on local SSD)
effective_io_concurrency = 200 # High for SSD; allows parallel I/O prefetch
seq_page_cost = 1.0
default_statistics_target = 200

# ------------------------------------------------------------------------------
# PARALLEL QUERY
# ------------------------------------------------------------------------------
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ------------------------------------------------------------------------------
# AUTOVACUUM TUNING
# At high ingestion rates, dead tuple accumulation can stall vacuuming.
# Increase autovacuum aggressiveness to keep table bloat in check.
# ------------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05      # Vacuum when 5% rows are dead
autovacuum_analyze_scale_factor = 0.02     # Analyze when 2% rows change
autovacuum_vacuum_cost_delay = 5ms         # Reduce autovacuum throttling

# ------------------------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off        # Docker captures stderr natively
log_min_duration_statement = 500   # Log queries slower than 500ms
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB
log_autovacuum_min_duration = 250ms

# ------------------------------------------------------------------------------
# TIMESCALEDB TUNING
# timescaledb.max_background_workers controls the chunk compression and
# continuous aggregate maintenance daemon pool.
# ------------------------------------------------------------------------------
timescaledb.max_background_workers = 4
shared_preload_libraries = 'timescaledb'
